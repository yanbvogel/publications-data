name: Update Publications

on:
  schedule:
    - cron: "0 3 * * *"   # daily update
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ✅ Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Step 2: Get ORCID publications (creates publications.yml)
      - name: Get ORCID publications
        uses: TheAlbertDev/get-orcid-publications@v0.1.0
        with:
          orcidId: "0000-0003-1975-7292"
          publicationsFilePath: "./"
          publicationsFileName: "publications"

      # ✅ Step 3: Convert YAML → JSON
      - name: Convert YAML to JSON
  run: |
    npm install js-yaml
    node <<EOF
    const fs = require('fs');
    const yaml = require('js-yaml');

    const data = yaml.load(fs.readFileSync('publications.yml', 'utf8'));
    const works = data.works || [];

    function formatAuthor(name) {
      const parts = name.trim().split(/\s+/);
      if (parts.length < 2) return name;

      const last = parts.pop();
      const initials = parts.map(p => p[0].toUpperCase() + ".").join(" ");
      return initials + " " + last;
    }

    const publications = works.map(p => {

      const authorsArr = (p.authors || []).map(formatAuthor);

      const authorsFormatted =
        authorsArr.length > 1
          ? authorsArr.slice(0, -1).join(", ") + ", and " + authorsArr.slice(-1)
          : (authorsArr[0] || "");

      return {
        title: p.title?.value || "",
        authors: authorsArr,
        authorsFormatted: authorsFormatted,
        journal: p.journalTitle || "",
        year: p.publicationDate?.year || "",
        doi: p.doi || "",
        url: p.url || ("https://doi.org/" + p.doi)
      };
    });

    fs.writeFileSync(
      'publications.json',
      JSON.stringify(publications, null, 2)
    );

    console.log("✅ Publications processed:", publications.length);
    EOF

      # ✅ Step 4: Commit files back to repo
      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add publications.yml publications.json
          git commit -m "Update publications data" || echo "No changes"
          git push
