name: Update Publications

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ✅ Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Step 2: Fetch ORCID publications
      - name: Get ORCID publications
        uses: TheAlbertDev/get-orcid-publications@v0.1.0
        with:
          orcidId: "0000-0003-1975-7292"
          publicationsFilePath: "./"
          publicationsFileName: "publications"

      # ✅ Step 3: Install dependency
      - name: Install js-yaml
        run: npm install js-yaml

      # ✅ Step 4: Convert YAML → JSON (ACS formatting, robust)
      - name: Convert data
        run: |
          cat > convert.js <<'EOF'
          const fs = require('fs');
          const yaml = require('js-yaml');

          try {
            const raw = fs.readFileSync('publications.yml', 'utf8');
            const data = yaml.load(raw);
            const works = data && data.works ? data.works : [];

            function formatAuthor(name) {
              if (!name) return "";

              name = name.trim();

              // Case: contains comma
              if (name.includes(",")) {
                let parts = name.split(",");
                let a = parts[0].trim();
                let b = (parts[1] || "").trim();

                // Fix reversed formats like "Y.B., V."
                if (/^[A-Z.]+$/.test(a) && /^[A-Z.]+$/.test(b)) {
                  return b + " " + a;
                }

                return a + ", " + b;
              }

              // Case: normal "First Middle Last"
              let parts = name.split(/\s+/);
              if (parts.length < 2) return name;

              let last = parts.pop();
              let initials = parts.map(p => p[0] ? p[0].toUpperCase() + "." : "").join(" ");

              return last + ", " + initials;
            }

            const publications = works.map(p => {
              let authors = (p.authors || []).map(formatAuthor).filter(a => a);

              let authorsStr = authors.length ? authors.join("; ") : "Unknown Author";

              let title = (p.title && p.title.value) ? p.title.value : "";
              title = title.replace(/\.+$/, "");

              let journal = p.journalTitle || "";
              let year = p.publicationDate && p.publicationDate.year ? p.publicationDate.year : "";

              let doi = p.doi || "";
              let url = p.url || ("https://doi.org/" + doi);

              let citation = `${authorsStr}. ${title}. ${journal} ${year}.`;

              // cleanup
              citation = citation
                .replace(/\s+/g, " ")
                .replace(/\.\./g, ".")
                .trim();

              return {
                title,
                authors,
                journal,
                year,
                doi,
                url,
                citation
              };
            });

            fs.writeFileSync('publications.json', JSON.stringify(publications, null, 2));

            console.log("✅ Publications processed:", publications.length);
          } catch (err) {
            console.error("❌ ERROR:", err);
            process.exit(1);
          }
          EOF

          node convert.js

      # ✅ Step 5: Commit results
      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add publications.yml publications.json
          git commit -m "Update publications (ACS clean)" || echo "No changes"
          git push
