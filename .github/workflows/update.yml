name: Update Publications

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ✅ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Fetch ORCID publications
      - name: Get ORCID publications
        uses: TheAlbertDev/get-orcid-publications@v0.1.0
        with:
          orcidId: "0000-0003-1975-7292"
          publicationsFilePath: "./"
          publicationsFileName: "publications"

      # ✅ Install dependency
      - name: Install YAML parser
        run: npm install js-yaml

      # ✅ Write conversion script to file
      - name: Create conversion script
        run: |
          cat << 'EOF' > convert.js
          const fs = require('fs');
          const yaml = require('js-yaml');

          try {
            const raw = fs.readFileSync('publications.yml', 'utf8');
            const data = yaml.load(raw);

            const works = (data && data.works) ? data.works : [];

            function formatAuthorACS(name) {
              if (!name) return "";
              const parts = name.trim().split(/\s+/);
              if (parts.length < 2) return name;

              const last = parts.pop();
              const initials = parts
                .map(p => p[0] ? p[0].toUpperCase() + "." : "")
                .join(" ");

              return last + ", " + initials;
            }

            const publications = works.map(p => {
              const authorsArr = (p.authors || []).map(formatAuthorACS);
              const authorsACS = authorsArr.join("; ");

              const title = (p.title && p.title.value) ? p.title.value.replace(/\.$/, "") : "";
              const journal = p.journalTitle || "";
              const year = (p.publicationDate && p.publicationDate.year) ? p.publicationDate.year : "";
              const doi = p.doi || "";
              const url = p.url || ("https://doi.org/" + doi);

              const citation = `${authorsACS}. ${title}. ${journal} ${year}.`;

              return {
                title,
                authors: authorsArr,
                journal,
                year,
                doi,
                url,
                citation
              };
            });

            fs.writeFileSync('publications.json', JSON.stringify(publications, null, 2));

            console.log("✅ Publications processed:", publications.length);

          } catch (err) {
            console.error("❌ ERROR:", err);
            process.exit(1);
          }
          EOF

      # ✅ Run conversion
      - name: Run conversion
        run: node convert.js

      # ✅ Commit files
      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add publications.yml publications.json
          git commit -m "Update publications (ACS format)" || echo "No changes"
          git push
