name: Update Publications

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get ORCID publications
        uses: TheAlbertDev/get-orcid-publications@v0.1.0
        with:
          orcidId: "0000-0003-1975-7292"
          publicationsFilePath: "./"
          publicationsFileName: "publications"

      - name: Convert YAML to JSON (ACS style)
        run: |
          npm install js-yaml
          node <<EOF
          const fs = require('fs');
          const yaml = require('js-yaml');

          const data = yaml.load(fs.readFileSync('publications.yml', 'utf8'));
          const works = data.works || [];

          function formatAuthorACS(name) {
            const parts = name.trim().split(/\s+/);
            if (parts.length < 2) return name;

            const last = parts.pop();
            const initials = parts.map(p => p[0].toUpperCase() + ".").join(" ");

            return last + ", " + initials;
          }

          const publications = works.map(p => {

            const authorsArr = (p.authors || []).map(formatAuthorACS);

            const authorsACS = authorsArr.join("; ");

            const title = (p.title?.value || "").replace(/\.$/, "");
            const journal = p.journalTitle || "";
            const year = p.publicationDate?.year || "";

            // ✅ FULL ACS-style citation string
            const citation = `${authorsACS}. ${title}. ${journal} ${year}.`;

            return {
              title: title,
              authors: authorsArr,
              journal: journal,
              year: year,
              doi: p.doi || "",
              url: p.url || ("https://doi.org/" + p.doi),
              citation: citation
            };
          });

          fs.writeFileSync(
            'publications.json',
            JSON.stringify(publications, null, 2)
          );

          console.log("✅ ACS citations generated:", publications.length);
          EOF

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add publications.yml publications.json
          git commit -m "Update publications (ACS format)" || echo "No changes"
          git push
