name: Update Publications

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get ORCID publications
        uses: TheAlbertDev/get-orcid-publications@v0.1.0
        with:
          orcidId: "0000-0003-1975-7292"
          publicationsFilePath: "./"
          publicationsFileName: "publications"

      - name: Install dependencies
        run: npm install js-yaml

      - name: Convert YAML → JSON (ACS final)
        run: |
          cat > convert.js <<'EOF'
          const fs = require('fs');
          const yaml = require('js-yaml');

          function abbreviateJournal(full) {
            if (!full) return "";

            const map = {
              "Journal of the American Chemical Society": "J. Am. Chem. Soc.",
              "Nature Communications": "Nat. Commun.",
              "ACS Nano": "ACS Nano",
              "Chemical Society Reviews": "Chem. Soc. Rev.",
              "Journal of Physical Chemistry C": "J. Phys. Chem. C",
              "The Journal of Physical Chemistry C": "J. Phys. Chem. C",
              "Chemistry of Materials": "Chem. Mater.",
              "ACS Applied Nano Materials": "ACS Appl. Nano Mater.",
              "Advanced Functional Materials": "Adv. Funct. Mater.",
              "Electrochimica Acta": "Electrochim. Acta",
              "Analytical Chemistry": "Anal. Chem.",
              "Langmuir": "Langmuir",
              "Cell Reports Physical Science": "Cell Rep. Phys. Sci.",
              "Journal of The Electrochemical Society": "J. Electrochem. Soc."
            };

            return map[full] || full;
          }

          function formatAuthor(name) {
            if (!name) return "";

            name = name.trim();

            if (name.includes(",")) {
              const [a, b] = name.split(",");
              if (/^[A-Z.]+$/.test(a) && /^[A-Z.]+$/.test(b || "")) {
                return b.trim() + " " + a.trim();
              }
              return a.trim() + ", " + (b || "").trim();
            }

            const parts = name.split(/\s+/);
            if (parts.length < 2) return name;

            const last = parts.pop();
            const initials = parts.map(p => p[0]?.toUpperCase() + ".").join(" ");

            return last + ", " + initials;
          }

          try {
            const raw = fs.readFileSync('publications.yml', 'utf8');
            const data = yaml.load(raw);
            const works = data?.works || [];

            const publications = works.map(p => {

              // AUTHORS
              let authors = (p.authors || [])
                .map(formatAuthor)
                .filter(Boolean)
                .map(a =>
                  a.includes("Vogel")
                    ? `<strong>${a}</strong>`
                    : a
                )
                .join("; ") || "Unknown Author";

              // TITLE
              let title = p.title?.value || "";
              title = title.replace(/\.+$/, "");

              // JOURNAL (✅ WITH ITALICS HERE)
              const journalAbbrev = abbreviateJournal(p.journalTitle || "");
              const journal = journalAbbrev ? `<em>${journalAbbrev}</em>` : "";

              const year = p.publicationDate?.year || "";
              const doi = p.doi || "";
              const url = p.url || ("https://doi.org/" + doi);

              // ✅ IMPORTANT: HTML ON PURPOSE
              let citation = `${authors}. ${title}. ${journal} ${year}.`;

              citation = citation
                .replace(/\s+/g, " ")
                .replace(/\.\./g, ".")
                .trim();

              return {
                citation,
                url
              };
            });

            fs.writeFileSync('publications.json', JSON.stringify(publications, null, 2));

            console.log("✅ Publications processed:", publications.length);

          } catch (err) {
            console.error(err);
            process.exit(1);
          }
          EOF

          node convert.js

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add publications.yml publications.json
          git commit -m "ACS style with journal italic + abbreviations" || echo "No changes"
          git push
