name: Update Publications

on:
  schedule:
    - cron workflow_dispatch:    - cron: "0 3 * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get ORCID publications
        uses: TheAlbertDev/get-orcid-publications@v0.1.0
        with:
          orcidId: "0000-0003-1975-7292"
          publicationsFilePath: "./"
          publicationsFileName: "publications"

      - name: Install YAML parser
        run: npm install js-yaml

      - name: Create conversion script
        run: |
          cat << 'EOF' > convert.js
          const fs = require('fs');
          const yaml = require('js-yaml');

          try {
            const raw = fs.readFileSync('publications.yml', 'utf8');
            const data = yaml.load(raw);

            const works = (data && data.works) ? data.works : [];

            function formatAuthorACS(name) {
              if (!name) return "";

              name = name.trim();

              // CASE 1: already "Last, Initials"
              if (name.includes(",")) {
                let [a, b] = name.split(",");

                a = a.trim();
                b = (b || "").trim();

                // detect incorrect reversed format like "Y.B., V."
                if (a.match(/^[A-Z.]+$/) && b.match(/^[A-Z.]+$/)) {
                  return b + " " + a; // swap
                }

                return a + ", " + b;
              }

              // CASE 2: "First Last"
              const parts = name.split(/\s+/);
              if (parts.length < 2) return name;

              let last = parts.pop();
              let initials = parts
                .map(p => p[0] ? p[0].toUpperCase() + "." : "")
                .join(" ");

              return last + ", " + initials;
            }

            const publications = works.map(p => {

              let authorsArr = (p.authors || []).map(formatAuthorACS);

              // remove empty authors
              authorsArr = authorsArr.filter(a => a.trim() !== "");

              const authorsACS =
                authorsArr.length > 0
                  ? authorsArr.join("; ")
                  : "Unknown Author";

              let title = (p.title && p.title.value) ? p.title.value : "";
              title = title.replace(/\.+$/, ""); // remove trailing dots

              const journal = p.journalTitle || "";
              const year = (p.publicationDate && p.publicationDate.year) || "";
              const doi = p.doi || "";
              const url = p.url || ("https://doi.org/" + doi);

              let citation = `${authorsACS}. ${title}. ${journal} ${year}.`;

              // remove double spaces and double dots
              citation = citation
                .replace(/\s+/g, " ")
                .replace(/\.\./g, ".")
                .trim();

              return {
                title,
                authors: authorsArr,
                journal,
                year,
                doi,
                url,
                citation
              };
            });

            fs.writeFileSync('publications.json', JSON.stringify(publications, null, 2));

            console.log("✅ Publications processed:", publications.length);

          } catch (err) {
            console.error("❌ ERROR:", err);
            process.exit(1);
          }
          EOF

      - name: Run conversion
        run: node convert.js

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add publications.yml publications.json
          git commit -m "Update publications (ACS clean format)" || echo "No changes"
          git push
